<h1>kts.VERSION</h1>
<h2>Name</h2>
<p>kts.VERSION &ndash; Knights version number </p>
<h2>Synopsis</h2>
<p><code>kts.VERSION</code> &ndash; an integer value </p>
<h2>Description</h2>
<p>This is equal to the current version of Knights, as an integer. For example, <code>28</code>. </p>
